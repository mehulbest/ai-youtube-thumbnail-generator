<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI YouTube Thumbnail Generator by mehulbest</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="header">
    <div class="logo">
      <span class="logo-icon">▶</span>
      <span class="logo-text">ThumbAI</span>
      <span class="logo-badge">by mehulbest</span>
    </div>
    <p class="tagline">Generate stunning YouTube thumbnails with AI — free &amp; open source</p>
  </header>

  <main class="container">

    <!-- STEP 1 -->
    <section class="card" id="step-input">
      <div class="step-label">01 / TOPIC</div>
      <h2 class="card-title">What's your video about?</h2>
      <input
        type="text"
        id="videoTitle"
        class="text-input"
        placeholder="e.g. 10 Python Tips That Will Blow Your Mind"
        maxlength="120"
      />
      <div class="char-counter"><span id="charCount">0</span> / 120</div>
    </section>

    <!-- STEP 2 -->
    <section class="card" id="step-style">
      <div class="step-label">02 / STYLE</div>
      <h2 class="card-title">Pick a thumbnail style</h2>
      <div class="style-grid">
        <button class="style-btn active" data-style="bold">
          <span class="style-emoji">🔥</span><span class="style-name">Bold</span>
        </button>
        <button class="style-btn" data-style="gaming">
          <span class="style-emoji">🎮</span><span class="style-name">Gaming</span>
        </button>
        <button class="style-btn" data-style="minimal">
          <span class="style-emoji">✦</span><span class="style-name">Minimal</span>
        </button>
        <button class="style-btn" data-style="vlog">
          <span class="style-emoji">🎬</span><span class="style-name">Vlog</span>
        </button>
        <button class="style-btn" data-style="tutorial">
          <span class="style-emoji">📚</span><span class="style-name">Tutorial</span>
        </button>
        <button class="style-btn" data-style="viral">
          <span class="style-emoji">⚡</span><span class="style-name">Viral</span>
        </button>
      </div>
    </section>

    <!-- GENERATE -->
    <button class="generate-btn" id="generateBtn" onclick="generateThumbnail()">
      <span id="btnText">✦ Generate Thumbnail</span>
      <span id="btnLoader" class="hidden">Generating with AI…</span>
    </button>

    <!-- STEP 3: Preview -->
    <section class="card hidden" id="step-preview">
      <div class="step-label">03 / PREVIEW</div>
      <h2 class="card-title">Your AI thumbnail</h2>

      <!-- Image shown here -->
      <div class="preview-wrapper" id="previewWrapper">
        <!-- Filled dynamically by script.js -->
      </div>

      <!-- Concept info -->
      <div class="concept-box" id="conceptBox"></div>

      <!-- Actions -->
      <div class="action-row">
        <button class="action-btn secondary" onclick="generateThumbnail()">↺ Regenerate</button>
        <button class="action-btn primary" onclick="downloadThumbnail()">⬇ Download PNG</button>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>Built with ❤️ by <strong>mehulbest</strong> · Powered by <a href="https://pollinations.ai" target="_blank">Pollinations.ai</a> · MIT License</p>
    <p class="footer-links">
      <a href="https://github.com/mehulbest/ai-youtube-thumbnail-generator" target="_blank">GitHub</a>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>

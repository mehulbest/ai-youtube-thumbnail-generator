<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI YouTube Thumbnail Generator by mehulbest</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">▶</span>
      <span class="logo-text">ThumbAI</span>
      <span class="logo-badge">by mehulbest</span>
    </div>
    <p class="tagline">Generate stunning YouTube thumbnails with AI — free &amp; open source</p>
  </header>

  <!-- ── MAIN CONTENT ── -->
  <main class="container">

    <!-- STEP 1: Input -->
    <section class="card" id="step-input">
      <div class="step-label">01 / TOPIC</div>
      <h2 class="card-title">What's your video about?</h2>
      <input
        type="text"
        id="videoTitle"
        class="text-input"
        placeholder="e.g. 10 Python Tips That Will Blow Your Mind"
        maxlength="120"
      />
      <div class="char-counter"><span id="charCount">0</span> / 120</div>
    </section>

    <!-- STEP 2: Style -->
    <section class="card" id="step-style">
      <div class="step-label">02 / STYLE</div>
      <h2 class="card-title">Pick a thumbnail style</h2>
      <div class="style-grid">
        <button class="style-btn active" data-style="bold" title="Bold & Impactful">
          <span class="style-emoji">🔥</span>
          <span class="style-name">Bold</span>
        </button>
        <button class="style-btn" data-style="gaming" title="Gaming Hype">
          <span class="style-emoji">🎮</span>
          <span class="style-name">Gaming</span>
        </button>
        <button class="style-btn" data-style="minimal" title="Clean Minimal">
          <span class="style-emoji">✦</span>
          <span class="style-name">Minimal</span>
        </button>
        <button class="style-btn" data-style="vlog" title="Personal Vlog">
          <span class="style-emoji">🎬</span>
          <span class="style-name">Vlog</span>
        </button>
        <button class="style-btn" data-style="tutorial" title="Educational Tutorial">
          <span class="style-emoji">📚</span>
          <span class="style-name">Tutorial</span>
        </button>
        <button class="style-btn" data-style="viral" title="Viral Clickbait">
          <span class="style-emoji">⚡</span>
          <span class="style-name">Viral</span>
        </button>
      </div>
    </section>

    <!-- GENERATE BUTTON -->
    <button class="generate-btn" id="generateBtn" onclick="generateThumbnail()">
      <span id="btnText">✦ Generate Thumbnail Concept</span>
      <span id="btnLoader" class="hidden">Generating…</span>
    </button>

    <!-- STEP 3: Preview -->
    <section class="card hidden" id="step-preview">
      <div class="step-label">03 / PREVIEW</div>
      <h2 class="card-title">Your thumbnail concept</h2>

      <!-- Canvas Thumbnail Preview -->
      <div class="preview-wrapper">
        <canvas id="thumbnailCanvas" width="1280" height="720"></canvas>
      </div>

      <!-- AI Concept Description -->
      <div class="concept-box" id="conceptBox"></div>

      <!-- Color Palette -->
      <div class="palette-row" id="paletteRow"></div>

      <!-- Actions -->
      <div class="action-row">
        <button class="action-btn secondary" onclick="generateThumbnail()">↺ Regenerate</button>
        <button class="action-btn primary" onclick="downloadThumbnail()">⬇ Download PNG</button>
      </div>
    </section>

  </main>

  <!-- ── FOOTER ── -->
  <footer class="footer">
    <p>Built with ❤️ by <strong>mehulbest</strong> · Open Source · MIT License</p>
    <p class="footer-links">
      <a href="https://github.com/mehulbest/ai-youtube-thumbnail-generator" target="_blank">GitHub</a>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
